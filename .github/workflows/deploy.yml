name: Auto-Create PR to Prod

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create or Update PR to Prod
        uses: repo-sync/pull-request@v2
        with:
          destination_branch: 'prod'
          source_branch: 'main'
          pr_title: 'Release: Sync main into prod'
          pr_body: 'Automated Pull Request from `main` to `prod`. Review changes and merge when ready to deploy.'
          github_token: ${{ secrets.GITHUB_TOKEN }}
